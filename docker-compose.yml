services:
  mysql:
    image: mysql:8.0
    container_name: cloudmind-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: cloudmind
      MYSQL_USER: cloudmind
      MYSQL_PASSWORD: cloudmind123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - cloudmind_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cloudmind-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - cloudmind_minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  cloudmind_mysql_data:
  cloudmind_minio_data:
